#############################################################################################
# pre-commit — language-agnostic hooks for this non-python repo (Angular/TS client).         #
# Language-specific linting/formatting stays with the repo's own toolchain (eslint/prettier  #
# via husky). Ruff/mypy/uv are python-only and NOT included here.                            #
#############################################################################################

# Never touch generated / vendored code. Tuned for this repo:
#   node_modules/            npm deps
#   api/                     generated proto JS/TS stubs
#   fesm2022/                generated Angular bundle (.mjs/.mjs.map)
#   coverage/ npm/           generated build/coverage output
#   ondewo-proto-compiler/   git submodule
#   src/ondewo-vtsi-api/     git submodule (generated proto api)
#   index.d.ts               generated rollup type defs (2.5MB)
#   public-api.d.ts.map      generated source map
#   package-lock.json        npm lockfile
#   *_pb.* / *_grpc_pb.* / *_pb2* generated proto stubs anywhere
exclude: |
  (?x)(
    ^node_modules/|
    ^api/|
    ^fesm2022/|
    ^coverage/|
    ^npm/|
    ^ondewo-proto-compiler/|
    ^src/ondewo-vtsi-api/|
    ^index\.d\.ts$|
    ^public-api\.d\.ts\.map$|
    ^package-lock\.json$|
    _pb\.(js|d\.ts)$|
    _grpc_pb\.(js|d\.ts)$|
    _pb2(_grpc)?\.pyi?$
  )

fail_fast: false

repos:

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.23.0
    hooks:
      - id: markdownlint-cli2

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: [ maxkb=1024 ]
      - id: check-json          # validate (does NOT reformat) json/package.json
      - id: check-yaml
      - id: check-xml
      - id: check-merge-conflict
      - id: check-symlinks
      - id: detect-private-key
      - id: check-executables-have-shebangs
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: https://github.com/milin/giticket
    rev: '1.92'
    hooks:
      - id: giticket
        args: [ '--regex=(?:(?:feature|bugfix|support|hotfix)/)?(OND[0-9]{3}-[0-9]{1,5})[_-][\w-]+',
                '--format=[{ticket}] {commit_msg}',
                '--mode=regex_match' ]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [ commit-msg ]
