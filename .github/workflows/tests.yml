name: tests

on:
  push:
    branches:
      - master
      - "OND211-**"
  pull_request:
    branches:
      - master

jobs:
  auth-unit-tests:
    name: Keycloak auth surface unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Run auth unit tests with coverage (100% gate on auth surface)
        run: npx jest --config jest.config.js --coverage --ci
